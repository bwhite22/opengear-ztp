- name: Show password API response
  debug:
    var: password_update
  
- name: Set hostname
  uri:
    url: "{{ base_url }}/system/hostname"
    method: PUT
    headers:
      Cookie: "session_id={{ hostvars['localhost']['api_token'] }}"
    body_format: json
    body:
      system_hostname:
        hostname: "{{ device_hostname }}"
    validate_certs: false
    return_content: true
    timeout: 10

- name: Check Lighthouse enrollment status
  uri:
    url: "{{ base_url }}/lighthouse_enrollments"
    method: GET
    headers:
      Cookie: "session_id={{ hostvars['localhost']['api_token'] }}"
    validate_certs: false
    return_content: true
    timeout: 10
  register: lh_status
  failed_when: false

- name: Enroll in Lighthouse
  uri:
    url: "{{ base_url }}/lighthouse_enrollments"
    method: POST
    headers:
      Cookie: "session_id={{ hostvars['localhost']['api_token'] }}"
    body_format: json
    body:
      lighthouse_enrollment:
        address: "10.218.255.80"
        token: "USBUNDLE"
        bundle: "US-OOB-Bundle"
        port: 443
    validate_certs: false
    return_content: true
    timeout: 10
  when: lh_status.json is not defined or lh_status.json | length == 0

- name: Configure NTP
  uri:
    url: "{{ base_url }}/services/ntp"
    method: PUT
    headers:
      Cookie: "session_id={{ hostvars['localhost']['api_token'] }}"
    body_format: json
    body:
      ntp:
        enabled: true
        servers:
          - value: "{{ ntp_server | default('192.168.122.14') }}"
            key:
              value: wuw8Ewrlvot
              index: 777
              format: ASCII
              algorithm: MD5
    validate_certs: false
    return_content: true
    timeout: 10
    
- name: Set timezone
  uri:
    url: "{{ base_url }}/system/timezone"
    method: PUT
    headers:
      Cookie: "session_id={{ hostvars['localhost']['api_token'] }}"
      Content-Type: "application/json"
    body: |
      {
        "system_timezone": {
          "timezone": "{{ timezone }}"
        }
      }
    validate_certs: false
    return_content: true
    timeout: 10

