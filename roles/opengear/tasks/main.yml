- name: Authenticate to Opengear (fallback logic)
  block:

    - name: Attempt default password reset
      uri:
        url: "{{ base_url }}/sessions"
        method: POST
        body_format: json
        body:
          username: root
          password: default
          new_password: "{{ ansible_password }}"
          confirm_password: "{{ ansible_password }}"
        validate_certs: false
        return_content: true
        status_code: [200]
      register: auth_response

  rescue:

    - name: Fallback to normal login
      uri:
        url: "{{ base_url }}/sessions"
        method: POST
        body_format: json
        body:
          username: root
          password: "{{ ansible_password }}"
        validate_certs: false
        return_content: true
        status_code: [200, 303]
      register: auth_response

- name: Save API token
  set_fact:
    api_token: "{{ auth_response.json.token | default(auth_response.json.sid) }}"
 
- name: Set hostname
  uri:
    url: "{{ base_url }}/system/hostname"
    method: PUT
    headers:
      token: "{{ api_token }}"
    body_format: json
    body:
      system_hostname:
        hostname: "{{ inventory_hostname }}"
    validate_certs: false
    
- name: Get WWAN config
  command: ogcli get physif wwan0
  register: wwan_config

- name: Set APN if needed
  shell: |
    ogcli update physif wwan0 << EOF
    cellular_setting.apn="{{ apn }}"
    EOF
  when: apn not in wwan_config.stdout

- name: Enable WWAN0 if needed
  command: ogcli update physif wwan0 enabled=true
  when: "'enabled = true' not in wwan_config.stdout"