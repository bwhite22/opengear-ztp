- name: Get device model/version
  uri:
    url: "{{ base_url }}/system/version"
    method: GET
    headers:
      Cookie: "session_id={{ hostvars['localhost']['api_token'] }}"
    validate_certs: false
    return_content: true
    timeout: 10
  register: version_info

- name: Determine platform model
  set_fact:
    og_model: "{{ version_info.json.model | default('unknown') }}"

- name: Set firewall physifs based on model
  set_fact:
    cellular_physif: >-
      {{
        'system_net_physifs-3'
        if '1200' in og_model else
        'system_net_physifs-12'
      }}

- name: Configure cellular firewall zone
  uri:
    url: "{{ base_url }}/firewall/zones/firewall_zones-3"
    method: PUT
    headers:
      Cookie: "session_id={{ hostvars['localhost']['api_token'] }}"
    body_format: json
    body:
      firewall_zone:
        physifs:
          - "{{ cellular_physif }}"
        description: Default private Firewall Zone for the cellular interface
        label: Cellular
        id: firewall_zones-3
        permit_all_traffic: true
        name: cellular
        masquerade: false
    validate_certs: false
    return_content: true
    timeout: 10

- name: Get WWAN config
  command: ogcli get physif wwan0
  register: wwan_config
  changed_when: false
  failed_when: false

- name: Set APN if needed
  shell: |
    ogcli update physif wwan0 << EOF
    cellular_setting.apn="{{ apn }}"
    EOF
  when: apn not in wwan_config.stdout

- name: Enable WWAN0 if needed
  command: ogcli update physif wwan0 enabled=true
  when: "'enabled = true' not in wwan_config.stdout"

- name: Wait for modem (non-fatal)
  pause:
    seconds: 5