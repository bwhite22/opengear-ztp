- name: Opengear ZTP Bootstrap
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    base_url: "https://{{ device_ip }}/api/v2"

  tasks:
    - name: Test API connectivity
      command: >
        curl -k -m 5 "https://{{ device_ip }}/api/v2"
      register: curl_test
      changed_when: false
      failed_when: false

    - name: Show curl output
      debug:
        var: curl_test

    - name: Attempt default password reset
      uri:
        url: "{{ base_url }}/sessions"
        method: POST
        body_format: json
        body:
          username: root
          password: default
          new_password: "{{ ansible_password }}"
          confirm_password: "{{ ansible_password }}"
        validate_certs: false
        return_content: true
        timeout: 10
        status_code: [200, 401]
        follow_redirects: all
        use_cookies: true
      register: default_auth
      failed_when: false

    - name: Show default auth response
      debug:
        var: default_auth

    - name: Fallback to normal login
      uri:
        url: "{{ base_url }}/sessions"
        method: POST
        body_format: json
        body:
          username: root
          password: "{{ ansible_password }}"
        validate_certs: false
        return_content: true
        timeout: 10
        status_code: [200, 303]
        follow_redirects: all
        #use_cookies: true
      when: (default_auth.status_code | default(0)) != 200
      register: fallback_auth

    - name: Show fallback auth response
      debug:
        var: fallback_auth
      when: (default_auth.status_code | default(0)) != 200

    - name: Save API token from default auth (if present)
      set_fact:
        api_token: "{{ default_auth.json.token }}"
      when:
        - default_auth is defined
        - default_auth.json is defined
        - default_auth.json.token is defined

    - name: Save API SID from default auth (if no token)
      set_fact:
        api_token: "{{ default_auth.json.sid }}"
      when:
        - api_token is not defined
        - default_auth is defined
        - default_auth.json is defined
        - default_auth.json.sid is defined

    - name: Save API token from fallback auth (if present)
      set_fact:
        api_token: "{{ fallback_auth.json.token }}"
      when:
        - api_token is not defined
        - fallback_auth is defined
        - fallback_auth.json is defined
        - fallback_auth.json.token is defined

    - name: Save API SID from fallback auth (last resort)
      set_fact:
        api_token: "{{ fallback_auth.json.sid }}"
      when:
        - api_token is not defined
        - fallback_auth is defined
        - fallback_auth.json is defined
        - fallback_auth.json.sid is defined
    
    - name: Add dynamic target host
      add_host:
        name: og_dynamic
        ansible_host: "{{ device_ip }}"
        ansible_user: root
        ansible_password: "{{ ansible_password }}"
        
    - name: Show target device
      debug:
        msg: "Provisioning device {{ device_ip }}"
    
- name: Opengear ZTP Configuration
  hosts: og_dynamic
  gather_facts: no


  vars:
    base_url: "https://{{ device_ip }}/api/v2"
    api_token: "{{ hostvars['localhost']['api_token'] }}"


  tasks:
    - name: Load Opengear role
      include_role:
        name: opengear
